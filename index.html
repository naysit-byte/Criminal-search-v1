const C = {bg:"#0a0f1e",surface:"#111827",border:"#1e2d3d",gold:"#d4af37",goldDim:"rgba(212,175,55,0.15)",text:"#e2e8f0",muted:"#64748b",subtle:"#94a3b8",danger:"#dc2626",info:"#3b82f6",purple:"#8b5cf6"};

const penaltyLevel = p => {
  if (!p||p==="-") return 0;
  if (p.includes("ประหาร")||p.includes("ตลอดชีวิต")) return 5;
  if (p.includes("15")||p.includes("20")) return 4;
  if (p.includes("10")||p.includes("5")) return 3;
  if (p.includes("3")||p.includes("4")) return 2;
  return 1;
};
const penaltyColor = p => ["#64748b","#16a34a","#ca8a04","#ea580c","#dc2626","#7c3aed"][penaltyLevel(p)];
const penaltyLabel = p => ["ไม่มีโทษจำคุก","โทษเบา","โทษปานกลาง","โทษหนัก","โทษสูงมาก","โทษสูงสุด"][penaltyLevel(p)];

function PenaltyPill({prison}) {
  const col = penaltyColor(prison);
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:3,background:`${col}18`,border:`1px solid ${col}44`,borderRadius:20,padding:"2px 8px",fontSize:11,color:col,fontWeight:700}}>
      {[0,1,2,3,4].map(i=><span key={i} style={{width:5,height:5,borderRadius:"50%",background:i<penaltyLevel(prison)?col:C.border}}/>)}
      <span style={{marginLeft:2}}>{prison!=="-"?prison:"ไม่มี"}</span>
    </span>
  );
}

function SearchTab() {
  const [query, setQuery] = useState("");
  const [selected, setSelected] = useState(null);
  const [category, setCategory] = useState("ทั้งหมด");
  const [focused, setFocused] = useState(false);
  const results = useMemo(() => {
    const q = query.toLowerCase().trim();
    return LAW_DATA.filter(law => {
      if (category!=="ทั้งหมด"&&law.category!==category) return false;
      if (!q) return true;
      return law.title.includes(q)||law.basis.includes(q)||String(law.section).includes(q)||law.keywords.some(k=>k.includes(q))||law.category.includes(q)||law.content.includes(q);
    });
  }, [query, category]);
  useEffect(() => { if (selected&&!results.find(r=>r.id===selected.id)) setSelected(null); }, [results]);
  const showDetail = !!selected;
  return (
    <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
      <div style={{padding:"12px 16px 0",background:C.surface,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{position:"relative",marginBottom:10}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,pointerEvents:"none"}}>🔍</span>
          <input style={{width:"100%",boxSizing:"border-box",background:C.bg,border:`2px solid ${focused?C.gold:C.border}`,borderRadius:10,padding:"9px 36px 9px 38px",fontSize:14,color:C.text,outline:"none",fontFamily:"'Sarabun',sans-serif",transition:"border-color 0.2s"}}
            placeholder="ค้นหามาตรา ชื่อความผิด คำสำคัญ..."
            value={query} onChange={e=>setQuery(e.target.value)}
            onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)} />
          {query&&<button onClick={()=>setQuery("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:C.border,border:"none",borderRadius:5,color:C.subtle,width:20,height:20,cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>}
        </div>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:10,scrollbarWidth:"none"}}>
          {CATEGORIES.map(cat=>{
            const active=category===cat;
            return <button key={cat} onClick={()=>setCategory(cat)} style={{flexShrink:0,padding:"4px 11px",borderRadius:20,border:`1px solid ${active?C.gold:C.border}`,background:active?C.goldDim:"transparent",color:active?C.gold:C.muted,fontSize:11,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'Sarabun',sans-serif"}}>{CAT_ICONS[cat]||"📌"} {cat}</button>;
          })}
        </div>
      </div>
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <div style={{width:showDetail?"300px":"100%",flexShrink:0,overflowY:"auto",borderRight:showDetail?`1px solid ${C.border}`:"none"}}>
          <div style={{padding:"6px 14px 2px",fontSize:11,color:C.muted}}>พบ <strong style={{color:C.text}}>{results.length}</strong> มาตรา{query&&<> · "<span style={{color:C.gold}}>{query}</span>"</>}</div>
          {results.length===0
            ? <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"50px 20px",color:C.muted,textAlign:"center"}}><div style={{fontSize:36,marginBottom:10}}>🔎</div><div style={{fontSize:14,color:C.subtle}}>ไม่พบผลลัพธ์</div></div>
            : results.map(law=>{
              const active=selected?.id===law.id;
              return (
                <div key={law.id} onClick={()=>setSelected(active?null:law)} style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,borderLeft:`3px solid ${active?C.gold:"transparent"}`,background:active?"#1a2332":"transparent",cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:3}}>
                    <span style={{fontSize:10,background:C.bg,border:`1px solid ${C.border}`,borderRadius:5,padding:"1px 6px",color:C.subtle,fontFamily:"monospace"}}>ม.{law.section}</span>
                    <PenaltyPill prison={law.prison}/>
                  </div>
                  <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:2}}>{law.title}</div>
                  <div style={{fontSize:11,color:C.muted}}>{CAT_ICONS[law.category]} {law.category}</div>
                </div>
              );
            })}
        </div>
        {selected&&<DetailPanel law={selected} onClose={()=>setSelected(null)} onTagClick={t=>setQuery(t)}/>}
      </div>
    </div>
  );
}

const QUICK_Q = ["ลักทรัพย์กับชิงทรัพย์ต่างกันอย่างไร?","โทษฐานฉ้อโกงคืออะไร?","อายุความฆ่าผู้อื่นกี่ปี?","มาตรา 157 คืออะไร?","การพยายามกระทำความผิดมีโทษอย่างไร?"];

function AiTab() {
  const [messages, setMessages] = useState([{role:"assistant",content:"สวัสดีครับ ผมเป็นผู้ช่วย AI สำหรับสืบค้นและวิเคราะห์ประมวลกฎหมายอาญาไทย ถามได้เลยครับ ⚖️"}]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages, loading]);

  const lawSummary = LAW_DATA.map(l=>`ม.${l.section} ${l.title}: ${l.basis} จำคุก:${l.prison} ปรับ:${l.fine} อายุความ:${l.prescription}`).join("\n");

  const send = async (text) => {
    const msg = text||input.trim();
    if (!msg||loading) return;
    setInput("");
    const newMessages = [...messages, {role:"user",content:msg}];
    setMessages(newMessages);
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:`คุณเป็นผู้เชี่ยวชาญประมวลกฎหมายอาญาไทย ตอบภาษาไทย กระชับ ชัดเจน ระบุมาตราที่เกี่ยวข้อง\nฐานข้อมูล:\n${lawSummary}\nคำเตือน: เป็นข้อมูลเบื้องต้น ควรปรึกษาทนายความสำหรับคดีจริง`,
          messages: newMessages.map(m=>({role:m.role,content:m.content})),
        }),
      });
      const data = await res.json();
      const answer = data.content?.find(b=>b.type==="text")?.text||"ขออภัย ไม่สามารถตอบได้";
      setMessages(prev=>[...prev,{role:"assistant",content:answer}]);
    } catch { setMessages(prev=>[...prev,{role:"assistant",content:"⚠️ เกิดข้อผิดพลาด กรุณาลองใหม่"}]); }
    setLoading(false);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:"16px"}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",gap:8,marginBottom:14,flexDirection:m.role==="user"?"row-reverse":"row",animation:"fadeIn 0.2s ease"}}>
            <div style={{width:30,height:30,borderRadius:"50%",flexShrink:0,background:m.role==="user"?C.goldDim:"#1e3a5f",border:`1px solid ${m.role==="user"?C.gold+"44":C.info+"44"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>{m.role==="user"?"👤":"⚖️"}</div>
            <div style={{maxWidth:"80%",background:m.role==="user"?C.goldDim:C.surface,border:`1px solid ${m.role==="user"?C.gold+"44":C.border}`,borderRadius:12,padding:"9px 13px",fontSize:13,color:C.text,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{m.content}</div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:"#1e3a5f",border:`1px solid ${C.info+"44"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>⚖️</div>
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 14px",display:"flex",gap:5,alignItems:"center"}}>
              {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:C.gold,animation:"pulse 1.2s ease-in-out infinite",animationDelay:`${i*0.2}s`}}/>)}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      {messages.length<=1&&(
        <div style={{padding:"0 14px 10px",display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none"}}>
          {QUICK_Q.map(q=><button key={q} onClick={()=>send(q)} style={{flexShrink:0,background:C.surface,border:`1px solid ${C.border}`,borderRadius:20,padding:"5px 11px",fontSize:11,color:C.subtle,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'Sarabun',sans-serif"}}>{q}</button>)}
        </div>
      )}
      <div style={{padding:"10px 14px",background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",gap:8,alignItems:"flex-end"}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="ถามเกี่ยวกับกฎหมายอาญา..." rows={2}
          style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"8px 12px",fontSize:13,color:C.text,outline:"none",fontFamily:"'Sarabun',sans-serif",resize:"none",lineHeight:1.5}}/>
        <button onClick={()=>send()} disabled={loading||!input.trim()} style={{background:loading||!input.trim()?C.border:C.gold,border:"none",borderRadius:10,width:40,height:40,cursor:loading||!input.trim()?"not-allowed":"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>➤</button>
      </div>
    </div>
  );
}

            </div>
            <div style={{background:C.bg,borderRadius:4,height:7,overflow:"hidden"}}>
              <div style={{width:`${(count/maxCount)*100}%`,height:"100%",background:`linear-gradient(90deg,${C.gold}88,${C.gold})`,borderRadius:4}}/>
            </div>
          </div>
        ))}
      </div>
      <div style={{background:C.surface,borderRadius:12,padding:"14px",border:`1px solid ${C.border}`}}>
        <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:12}}>การกระจายระดับโทษ</div>
        {levelCounts.map(({label,count,color,level})=>(
          <div key={level} style={{display:"flex",alignItems:"center",gap:8,background:C.bg,borderRadius:8,padding:"9px 12px",marginBottom:8,border:`1px solid ${color}33`}}>
            <div style={{display:"flex",gap:3}}>{[1,2,3,4,5].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:i<=level?color:C.border}}/>)}</div>
            <span style={{flex:1,fontSize:12,color:C.subtle}}>{label}</span>
            <span style={{fontSize:13,fontWeight:700,color}}>{count}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

const TABS = [{key:"search",icon:"🔍",label:"สืบค้น"},{key:"ai",icon:"🤖",label:"AI วิเคราะห์"},{key:"stats",icon:"📊",label:"สถิติ"}];

function App() {
  const [tab, setTab] = useState("search");
  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:C.bg,fontFamily:"'Sarabun',sans-serif",color:C.text,overflow:"hidden"}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 16px 0",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{width:34,height:34,borderRadius:9,background:"linear-gradient(135deg,#d4af37,#b8860b)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>⚖️</div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:C.text}}>ระบบประมวลกฎหมายอาญา</div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:"0.05em",textTransform:"uppercase"}}>Thai Criminal Code · AI-Powered</div>
          </div>
        </div>
        <div style={{display:"flex"}}>
          {TABS.map(t=>{
            const active=tab===t.key;
            return <button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,padding:"6px 4px 10px",background:"none",border:"none",borderBottom:`2px solid ${active?C.gold:"transparent"}`,color:active?C.gold:C.muted,fontSize:11,fontWeight:active?700:400,cursor:"pointer",fontFamily:"'Sarabun',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:15}}>{t.icon}</span><span>{t.label}</span>

          })}
        </div>
      </div>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {tab==="search"&&<SearchTab/>}
        {tab==="ai"&&<AiTab/>}
        {tab==="stats"&&<StatsTab/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
